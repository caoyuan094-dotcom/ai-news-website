        let currentCategory = 'all';
        let filteredNews = [...newsData];

        function init() {
            renderNews(newsData);
        }

        function renderNews(newsList) {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '';
            newsList.forEach((news, index) => {
                const card = createNewsCard(news, index);
                grid.appendChild(card);
            });
        }

        function createNewsCard(news, index) {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.style.animationDelay = `${index * 0.05}s`;
            card.innerHTML = `
                ${news.isNew ? '<span class="badge-new">NEW</span>' : ''}
                <div class="news-header">
                    <span class="news-category">${news.categoryName}</span>
                    <span class="news-time">${news.time}</span>
                </div>
                <h3 class="news-title">${news.title}</h3>
                <p class="news-summary">${news.summary}</p>
                <div class="news-meta">
                    <span class="reading-time">⏱️ ${news.readTime}</span>
                    <span>👁️ ${Math.floor(Math.random() * 5000 + 1000)}</span>
                </div>
            `;
            return card;
        }

        function filterCategory(category, btnElement) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) {
                btnElement.classList.add('active');
            }
            if (category === 'all') {
                filteredNews = [...newsData];
            } else {
                filteredNews = newsData.filter(news => news.category === category);
            }
            renderNews(filteredNews);
        }

        function searchNews() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                filteredNews = currentCategory === 'all' ? [...newsData] : newsData.filter(news => news.category === currentCategory);
            } else {
                filteredNews = newsData.filter(news => 
                    news.title.toLowerCase().includes(searchTerm) || 
                    news.summary.toLowerCase().includes(searchTerm)
                );
            }
            renderNews(filteredNews);
        }

        function refreshNews() {
            const loadingMsg = document.getElementById('loadingMsg');
            loadingMsg.style.display = 'block';
            setTimeout(() => {
                loadingMsg.style.display = 'none';
                renderNews(filteredNews);
            }, 1000);
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchNews();
            }
        });

        init();
    </script>
