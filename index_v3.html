            position: relative;

            position: absolute;

            left: 0;

            height: 2px;

            font-weight: 700;

            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);

            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn:hover { background: var(--primary-light); transform: translateY(-1px); }

        .categories { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
        .category-btn {

            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);

            font-size: 14px;

            gap: 24px;
            margin-bottom: 40px;

            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .news-card:hover::before { opacity: 1; }

            padding-top: 16px;
            border-top: 1px solid var(--border);

            color: var(--text-muted);

            color: var(--text-secondary);

            left: 0;
            right: 0;

            padding: 24px;

            right: 24px;

            height: 36px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);

            color: var(--text-secondary);

                category: "行业动态",
                excerpt: "国家网信办发布生成式AI服务管理实施细则，明确备案流程、安全评估标准和违规处罚措施，促进行业规范发展。",
                content: "国家互联网信息办公室正式发布《生成式人工智能服务管理暂行办法》的实施细则，为AI行业发展提供明确指引。\n\n核心要点：\n• 明确生成式AI服务的定义和适用范围\n• 规定服务提供者需进行安全评估和算法备案\n• 建立内容标识制度，AI生成内容需明确标注\n• 要求建立投诉举报机制和用户权益保护措施\n• 设定数据安全和隐私保护标准\n• 明确违规行为的处罚措施和整改要求\n\n细则强调"促进发展与规范管理并重"的原则，鼓励技术创新同时保障安全可靠。业内专家认为，这将有助于建立健康有序的AI产业生态，提升国际竞争力。\n\n多家AI企业表示将积极配合监管要求，加强自律建设。",
                time: "9小时前",
                views: 6543,
                isNew: false
            }
        ];

        let currentNews = null;
        let activeCategory = '全部';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderCategories();
            renderNews(newsData);
            updateStats();
            
            // Search functionality
            document.getElementById('searchInput').addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                const filtered = newsData.filter(item => 
                    item.title.toLowerCase().includes(query) || 
                    item.excerpt.toLowerCase().includes(query)
                );
                renderNews(filtered);
            });
        });

        function renderCategories() {
            const categories = ['全部', ...new Set(newsData.map(item => item.category))];
            const container = document.getElementById('categories');
            container.innerHTML = categories.map(cat => `
                <button class="category-btn ${cat === activeCategory ? 'active' : ''}" 
                        onclick="filterByCategory('${cat}')">
                    ${cat}
                </button>
            `).join('');
        }

        function filterByCategory(category) {
            activeCategory = category;
            renderCategories();
            
            if (category === '全部') {
                renderNews(newsData);
            } else {
                const filtered = newsData.filter(item => item.category === category);
                renderNews(filtered);
            }
        }

        function renderNews(items) {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = items.map(item => `
                <div class="news-card" onclick="openModal(${item.id})">
                    <div class="news-header">
                        <span class="news-category">${item.category}</span>
                        ${item.isNew ? '<span class="news-badge">NEW</span>' : ''}
                    </div>
                    <h3 class="news-title">${item.title}</h3>
                    <p class="news-excerpt">${item.excerpt}</p>
                    <div class="news-meta">
                        <span>${item.time} · 👁 ${item.views.toLocaleString()}</span>
                        <div class="news-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); shareArticle(${item.id})">分享</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            currentNews = newsData.find(item => item.id === id);
            if (!currentNews) return;

            document.getElementById('modalTitle').textContent = currentNews.title;
            document.getElementById('modalMeta').innerHTML = `
                <span>📂 ${currentNews.category}</span>
                <span>⏰ ${currentNews.time}</span>
                <span>👁 ${currentNews.views.toLocaleString()} 阅读</span>
            `;
            document.getElementById('modalContent').innerHTML = currentNews.content.replace(/\n/g, '<br>');
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Share functions
        function shareArticle(id) {
            const news = newsData.find(item => item.id === id);
            if (!news) return;
            
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(news.title);
            const text = encodeURIComponent(`推荐一篇AI资讯：${news.title}\n${news.excerpt}`);
            
            // Show share modal
            openModal(id);
        }

        function shareToWechat() {
            if (!currentNews) return;
            
            const shareText = `推荐一篇AI资讯：${currentNews.title}\n\n${currentNews.excerpt}\n\n查看详情：${window.location.href}`;
            
            // Copy to clipboard for WeChat sharing
            navigator.clipboard.writeText(shareText).then(() => {
                alert('已复制到剪贴板！请打开微信粘贴发送给好友或朋友圈');
            }).catch(() => {
                prompt('请复制以下内容分享到微信：', shareText);
            });
        }

        function shareToXiaohongshu() {
            if (!currentNews) return;
            
            const shareText = `🤖 AI前沿资讯分享\n\n📌 ${currentNews.title}\n\n💡 ${currentNews.excerpt}\n\n🔗 完整内容：${window.location.href}\n\n#AI资讯 #人工智能 #科技前沿 #每日更新`;
            
            navigator.clipboard.writeText(shareText).then(() => {
                alert('已复制到剪贴板！请打开小红书粘贴发布笔记');
            }).catch(() => {
                prompt('请复制以下内容分享到小红书：', shareText);
            });
        }

        function shareToWeibo() {
            if (!currentNews) return;
            
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(currentNews.title);
            const weiboUrl = `https://service.weibo.com/share/share.php?url=${url}&title=${title}`;
            
            window.open(weiboUrl, '_blank', 'width=600,height=400');
        }

        function shareToTwitter() {
            if (!currentNews) return;
            
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(`${currentNews.title} - AI时事资讯`);
            const twitterUrl = `https://twitter.com/intent/tweet?url=${url}&text=${text}`;
            
            window.open(twitterUrl, '_blank', 'width=600,height=400');
        }

        function updateStats() {
            document.getElementById('totalNews').textContent = newsData.length;
        }

        function refreshNews() {
            // Simulate refresh animation
            const btn = event.target;
            btn.textContent = '加载中...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.textContent = '🔄 刷新';
                btn.disabled = false;
                
                // Shuffle news order to simulate new content
                const shuffled = [...newsData].sort(() => Math.random() - 0.5);
                renderNews(shuffled);
                
                // Update timestamp
                const now = new Date();
                const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
                document.querySelector('.stat-label:last-child').textContent = `更新于 ${timeStr}`;
            }, 1000);
        }

        // Close modal on overlay click
        document.getElementById('newsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Keyboard shortcut to close modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
