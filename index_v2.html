<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI时事 - 每日AI资讯聚合平台</title>
    <style>
        :root {
            --primary: #5E6AD2;
            --primary-light: #7B84E0;
            --bg-primary: #0F1117;
            --bg-secondary: #1A1D27;
            --bg-card: #1E2130;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A3B1;
            --text-muted: #6B6F7F;
            --border: #2A2D3A;
            --accent-green: #10B981;
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.5);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }

        header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px;
            margin-bottom: 40px;
        }

        .header-content { display: flex; justify-content: space-between; align-items: center; gap: 32px; flex-wrap: wrap; }

        h1 {
            font-size: 3em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle { color: var(--text-secondary); font-size: 1.1em; }

        .stats-bar { display: flex; gap: 24px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
        .stat-value { font-size: 1.8em; font-weight: 700; color: var(--primary-light); }
        .stat-label { font-size: 0.85em; color: var(--text-muted); text-transform: uppercase; }

        .controls { display: flex; gap: 16px; align-items: center; }

        .search-box { position: relative; flex: 1; max-width: 400px; }
        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 15px;
        }
        .search-box input:focus { outline: none; border-color: var(--primary); }

        .btn {
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn:hover { background: var(--primary-light); transform: translateY(-1px); }

        .categories { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
        .category-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .category-btn:hover { background: var(--bg-secondary); border-color: var(--primary); color: var(--text-primary); }
        .category-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; }

        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        .news-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: var(--shadow-lg); }

        .badge-new {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 4px 12px;
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: white;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .news-category {
            padding: 6px 12px;
            background: rgba(94, 106, 210, 0.1);
            color: var(--primary-light);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            display: inline-block;
        }

        .news-title { font-size: 1.3em; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }
        .news-summary { color: var(--text-secondary); font-size: 15px; line-height: 1.6; margin-bottom: 16px; }
        .news-meta { display: flex; gap: 16px; padding-top: 16px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 13px; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; align-items: center; justify-content: center; padding: 24px; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            width: 36px; height: 36px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
        }
        .modal-close:hover { background: var(--bg-primary); border-color: var(--primary); color: var(--text-primary); }

        .modal-header { padding: 40px 40px 0; }
        .modal-title { font-size: 2em; font-weight: 700; margin-bottom: 16px; }
        .modal-body { padding: 32px 40px 40px; }
        .modal-content { color: var(--text-secondary); font-size: 16px; line-height: 1.8; }
        .modal-footer { padding: 24px 40px; border-top: 1px solid var(--border); }

        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            header { padding: 32px 24px; }
            h1 { font-size: 2em; }
            .header-content { flex-direction: column; align-items: stretch; }
            .controls { flex-direction: column; }
            .search-box { max-width: none; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

            <p>© 2024 AI时事 | 数据每小时自动更新</p>
        </div>

            </div>
            <div class="modal-footer">

        </div>
    </div>

        let currentCategory = 'all';
        let searchTerm = '';

        function createNewsCard(news) {
            return `
                <div class="news-card" onclick="openModal(${news.id})">
                    ${news.isNew ? '<span class="badge-new">NEW</span>' : ''}
                    <span class="news-category">${news.categoryName}</span>
                    <h3 class="news-title">${news.title}</h3>
                    <p class="news-summary">${news.summary}</p>
                    <div class="news-meta">
                        <span>⏱️ ${news.readTime}</span>
                        <span>📅 ${news.time}</span>
                    </div>
                </div>
            `;
        }

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            let filtered = newsData;

            if (currentCategory !== 'all') {
                filtered = filtered.filter(n => n.category === currentCategory);
            }

            if (searchTerm) {
                filtered = filtered.filter(n => 
                    n.title.includes(searchTerm) || n.summary.includes(searchTerm)
                );
            }

            grid.innerHTML = filtered.map(createNewsCard).join('');
        }

        function filterCategory(category, btn) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderNews();
        }

        function openModal(id) {
            const news = newsData.find(n => n.id === id);
            if (!news) return;

            document.getElementById('modalCategory').textContent = news.categoryName;
            document.getElementById('modalTitle').textContent = news.title;
            document.getElementById('modalContent').innerHTML = `
                <p>${news.summary}</p>
                <p>这里是文章的详细内容。在实际应用中，这里会显示完整的新闻内容，包括更多的背景信息、相关数据、专家观点和深入分析。</p>
                <p>AI技术的快速发展正在改变我们的工作和生活。从自然语言处理到计算机视觉，从推荐系统到自动驾驶，AI的应用场景越来越广泛。</p>
                <p>随着技术的不断进步，我们可以期待看到更多创新的AI应用出现，为社会带来更多价值。</p>
            `;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target.id === 'modalOverlay' || event.target.classList.contains('modal-close')) {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        }

        function refreshNews() {
            const btn = event.target;
            btn.textContent = '⏳ 刷新中...';
            setTimeout(() => {
                btn.textContent = '🔄 刷新';
                renderNews();
            }, 1000);
        }

        function shareArticle() {
            if (navigator.share) {
                navigator.share({
                    title: document.getElementById('modalTitle').textContent,
                    text: document.getElementById('modalContent').textContent.substring(0, 100) + '...',
                    url: window.location.href
                });
            } else {
                alert('链接已复制到剪贴板');
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderNews();
        });

        // Initial render
        renderNews();
    </script>
